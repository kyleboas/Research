<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Research Workflow Dashboard</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #ffffff;
        --surface: #ffffff;
        --line: #e5e5e7;
        --text: #111218;
        --subtext: #6f7177;
        --accent: #2f6fed;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      .wrap {
        max-width: 920px;
        margin: 0 auto;
        padding: 0 16px 28px;
      }

      .header {
        border-bottom: 1px solid var(--line);
        padding: 16px 4px 14px;
      }

      .title {
        margin: 0 0 16px;
        text-align: center;
        font-size: clamp(1.25rem, 3vw, 1.5rem);
        line-height: 1.1;
        letter-spacing: -0.02em;
      }

      .tabs {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .tab-btn {
        border: 1px solid var(--line);
        background: #f3f3f4;
        color: #40424a;
        border-radius: 999px;
        padding: 8px 14px;
        font-weight: 600;
        font-size: 0.9rem;
        cursor: pointer;
        transition: 140ms ease;
      }

      .tab-btn:hover,
      .tab-btn:focus-visible {
        border-color: #ccd7ff;
        color: #1c2a57;
      }

      .tab-btn.active {
        border-color: transparent;
        background: var(--accent);
        color: #fff;
      }

      .tab {
        display: none;
        padding: 8px 4px 20px;
      }

      .tab.active { display: block; }

      .list-item {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 12px;
        border-bottom: 1px solid var(--line);
        padding: 14px 0;
        text-decoration: none;
        color: inherit;
      }

      .list-item:last-child { border-bottom: 0; }

      .item-title {
        margin: 0;
        font-size: 1.35rem;
        line-height: 1.2;
        letter-spacing: -0.015em;
      }

      .item-sub,
      .item-meta {
        margin: 3px 0 0;
        color: var(--subtext);
      }

      .item-time {
        align-self: end;
        color: #8f9197;
        font-size: 0.95rem;
      }

      .trend {
        border-bottom: 1px solid var(--line);
        padding: 14px 0;
      }

      .trend:last-child { border-bottom: 0; }

      .trend h3 {
        margin: 0 0 8px;
        font-size: 1.2rem;
      }

      .rank {
        display: inline-block;
        min-width: 2ch;
        margin-right: 8px;
        color: var(--accent);
      }

      .source-thread {
        margin: 0;
        padding-left: 24px;
        color: var(--subtext);
      }

      .source-thread li { margin: 6px 0; }

      .status-grid {
        display: grid;
        gap: 12px;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        padding: 8px 0;
      }

      .status-card {
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 14px;
        background: #fafafb;
      }

      .status-label {
        margin: 0;
        color: var(--subtext);
        font-size: 0.88rem;
      }

      .status-value {
        margin: 4px 0 0;
        font-size: 1.12rem;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <header class="header">
        <h1 class="title">Research Dashboard</h1>
        <nav class="tabs" aria-label="Dashboard tabs">
          <button class="tab-btn active" data-tab="logs">Logs</button>
          <button class="tab-btn" data-tab="ingest">Ingest</button>
          <button class="tab-btn" data-tab="detect">Detect</button>
          <button class="tab-btn" data-tab="reports">Reports</button>
          <button class="tab-btn" data-tab="status">Status</button>
        </nav>
      </header>

      <section id="logs" class="tab active" aria-live="polite"></section>
      <section id="ingest" class="tab"></section>
      <section id="detect" class="tab"></section>
      <section id="reports" class="tab"></section>
      <section id="status" class="tab"></section>
    </main>

    <script>
      const truncate = (text, length = 255) =>
        text.length > length ? `${text.slice(0, length)}…` : text;

      const safeText = (value, fallback = "") => (value == null || value === "" ? fallback : String(value));

      const formatIsoTime = (value) => {
        if (!value) return "—";
        const dt = new Date(value);
        if (Number.isNaN(dt.getTime())) return value;
        return dt.toLocaleString();
      };

      const renderEmpty = (container, title, detail = "") => {
        container.innerHTML = `<article class="list-item"><div><h2 class="item-title">${title}</h2><p class="item-sub">${detail}</p></div><span class="item-time">—</span></article>`;
      };

      const logsEl = document.getElementById("logs");
      const ingestEl = document.getElementById("ingest");
      const detectEl = document.getElementById("detect");
      const reportsEl = document.getElementById("reports");
      const statusEl = document.getElementById("status");

      const renderLogs = (items) => {
        logsEl.innerHTML = "";
        if (!items.length) {
          renderEmpty(logsEl, "No workflow events yet", "Run ingest/detect/report steps to populate logs.");
          return;
        }

        items.forEach((item) => {
          logsEl.insertAdjacentHTML(
            "beforeend",
            `<article class="list-item"><div><h2 class="item-title">${safeText(item.event, "Event")}</h2><p class="item-sub">${truncate(safeText(item.detail, ""))}</p></div><span class="item-time">${formatIsoTime(item.time)}</span></article>`
          );
        });
      };

      const renderIngestItems = (items) => {
        ingestEl.innerHTML = "";
        if (!items.length) {
          renderEmpty(ingestEl, "No ingested items yet", "Run ingest to populate this tab.");
          return;
        }

        items.forEach((item) => {
          const hasUrl = Boolean(item.url);
          ingestEl.insertAdjacentHTML(
            "beforeend",
            `<a class="list-item" href="${hasUrl ? item.url : "#"}" ${hasUrl ? `target="_blank" rel="noreferrer"` : ""}><div><h2 class="item-title">${safeText(item.title, "Untitled")}</h2><p class="item-sub">${truncate(safeText(item.description, ""))}</p><p class="item-meta">${safeText(item.source_type, "unknown")}</p></div><span class="item-time">${formatIsoTime(item.created_at)}</span></a>`
          );
        });
      };

      const renderDetect = (items) => {
        detectEl.innerHTML = "";
        if (!items.length) {
          renderEmpty(detectEl, "No detected trends yet", "Run detect to populate this tab.");
          return;
        }

        items.forEach((item, index) => {
          detectEl.insertAdjacentHTML(
            "beforeend",
            `<article class="trend"><h3><span class="rank">#${index + 1}</span>${safeText(item.trend, "Untitled trend")}</h3><ul class="source-thread"><li>Score: ${safeText(item.score, "n/a")}</li><li>Status: ${safeText(item.status, "unknown")}</li><li>Detected: ${formatIsoTime(item.detected_at)}</li>${item.reasoning ? `<li>${truncate(item.reasoning)}</li>` : ""}</ul></article>`
          );
        });
      };

      const renderReports = (items) => {
        reportsEl.innerHTML = "";
        if (!items.length) {
          renderEmpty(reportsEl, "No reports yet", "Run report generation to populate this tab.");
          return;
        }

        items.forEach((report) => {
          const hasUrl = Boolean(report.url);
          reportsEl.insertAdjacentHTML(
            "beforeend",
            `<a class="list-item" href="${hasUrl ? report.url : "#"}" ${hasUrl ? `target="_blank" rel="noreferrer"` : ""}><div><h2 class="item-title">${safeText(report.title, "Untitled report")}</h2><p class="item-sub">${truncate(safeText(report.description, ""))}</p><p class="item-meta">${formatIsoTime(report.created_at)}</p></div><span class="item-time">${hasUrl ? "↗" : "•"}</span></a>`
          );
        });
      };

      const renderStatus = (items) => {
        if (!items.length) {
          statusEl.innerHTML = "";
          renderEmpty(statusEl, "No status available", "No runtime status data was returned.");
          return;
        }

        statusEl.innerHTML = `<div class="status-grid">${items
          .map(
            (entry) =>
              `<section class="status-card"><p class="status-label">${safeText(entry.label, "Unknown")}</p><p class="status-value">${safeText(entry.value, "Unknown")}</p></section>`
          )
          .join("")}</div>`;
      };

      const loadDashboard = async () => {
        try {
          const response = await fetch("/api/dashboard");
          const payload = await response.json();

          if (!response.ok) {
            throw new Error(payload.warning || "Failed to load dashboard data");
          }

          renderLogs(payload.logs || []);
          renderIngestItems(payload.ingest || []);
          renderDetect(payload.detect || []);
          renderReports(payload.reports || []);
          renderStatus(payload.status || []);

          if (payload.warning) {
            logsEl.insertAdjacentHTML(
              "afterbegin",
              `<article class="list-item"><div><h2 class="item-title">Warning</h2><p class="item-sub">${payload.warning}</p></div><span class="item-time">!</span></article>`
            );
          }
        } catch (error) {
          renderEmpty(logsEl, "Unable to load logs", error.message);
          renderEmpty(ingestEl, "Unable to load ingested items", error.message);
          renderEmpty(detectEl, "Unable to load detected trends", error.message);
          renderEmpty(reportsEl, "Unable to load reports", error.message);
          renderEmpty(statusEl, "Unable to load status", error.message);
        }
      };

      loadDashboard();

      const tabs = [...document.querySelectorAll(".tab-btn")];
      tabs.forEach((btn) => {
        btn.addEventListener("click", () => {
          tabs.forEach((el) => el.classList.remove("active"));
          document.querySelectorAll(".tab").forEach((el) => el.classList.remove("active"));
          btn.classList.add("active");
          document.getElementById(btn.dataset.tab).classList.add("active");
        });
      });
    </script>

  </body>
</html>
